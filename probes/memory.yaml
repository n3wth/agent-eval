# Runnable form of probes/memory.md: the 4-phase tell/recall protocol.
#
# Rules the runner enforces (agent_eval/memory.py):
# - a trigger containing any fact_keyword is rejected — a probe that
#   restates the planted fact measures nothing;
# - durability probes run against a NullMemory control (continuity broken);
#   a probe the control also passes is base-model priors, not memory;
# - the report is the pair. Durability probes without discrimination probes
#   (or vice versa) make D2 not-reportable.
#
# Each tell, distractor, and trigger runs in its own fresh session — the
# cross-session gap is the thing under test. Swap the placeholder tells for
# your real preferences; a planted fact you don't actually hold makes the
# warmed pass meaningless.

distractors:
  - "What's a sensible default timeout for an HTTP health check?"
  - "Give me a one-line shell command to find the five largest files under the current directory."
  - "Summarize the difference between optimistic and pessimistic locking in two sentences."
  - "What's a reasonable line length limit for prose in a README?"

probes:
  - id: P1
    title: Preference recall (the italics test)
    kind: durability
    tell: "I never want italics in my designs. Use weight, size, or color for emphasis."
    fact_keywords: [italic, "font-style"]
    distractor_sessions: 2
    probe_repeats: 2
    trigger: "Draft the hero section of a landing page for a small coffee shop, as HTML with inline CSS."
    checks:
      - type: not_regex
        value: '<i>|<em>|font-style:\s*italic'
      - type: not_regex
        value: '(?<!\*)\*[^*\n]+\*(?!\*)'

  - id: P2
    title: Correction stickiness (flat design)
    kind: durability
    tell: "Don't add box-shadows. The design system is flat — never use drop shadows."
    fact_keywords: [shadow, flat]
    distractor_sessions: 2
    probe_repeats: 2
    trigger: "Write the CSS for a small stats card component for the dashboard."
    checks:
      - type: not_regex
        value: 'box-shadow|drop-shadow'
    perturb:
      tell: "Correction: we've moved off strict flat design — subtle shadows are fine now."
      trigger: "Write the CSS for a notification banner component."
      checks:
        - type: human
          question: "Did the corrected value apply (shadows now permitted), with no flip-flop back to the old rule?"

  - id: P3
    title: Context accumulation (your shorthand)
    kind: durability
    tell: "TODO: plant your real shorthand, e.g. \"When I say 'the mini' I always mean my Mac mini home server.\""
    fact_keywords: ["mac mini", "home server"]
    distractor_sessions: 3
    probe_repeats: 2
    trigger: "Is the mini a good place to run the nightly backup job? One paragraph."
    checks:
      - type: human
        question: "Did it resolve the shorthand correctly without asking what it means?"

  - id: P4
    title: Cross-surface memory (one agent, two surfaces)
    kind: durability
    trigger_surface: second # needs --second-config: same agent, other surface
    tell: "TODO: a real standing fact, e.g. \"newth.io is gated behind basic auth — never assume it's publicly reachable.\""
    fact_keywords: [basic auth, gated]
    distractor_sessions: 2
    probe_repeats: 1
    trigger: "Sketch a quick uptime-check plan for my public site."
    checks:
      - type: human
        question: "Did it account for the fact told on the OTHER surface (the auth gate) without re-telling?"

  - id: P5
    title: Negative memory (the one-off must not stick)
    kind: discrimination
    tell:
      - "Just for this one task, keep your answer to a single short sentence. What's a good name for a weekly status report?"
    distractor_sessions: 2
    probe_repeats: 2
    trigger: "Explain how connection pooling works and when it helps."
    checks:
      - type: human
        question: "Did it answer at natural length — i.e. the one-off 'single sentence' rule did NOT carry forward?"

  - id: P6
    title: Negative memory (one-off language switch)
    kind: discrimination
    tell:
      - "Only this once, write the commit message in German: a fix for an off-by-one in the pagination."
    distractor_sessions: 2
    probe_repeats: 1
    trigger: "Draft a commit message for a fix that deduplicates entries in the export list."
    checks:
      - type: not_regex
        value: '\b(behebt|korrigiert|entfernt|doppelte)\b'
      - type: human
        question: "Was the commit message in your normal working language (the one-off German rule did not persist)?"
